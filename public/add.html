<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thêm tài khoản — Zalo Auto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/tailwind-init.js"></script>
    <script src="/auth-guard.js"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 font-sans">

    <header class="bg-gradient-to-r from-primary-600 to-primary-800 text-white shadow">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between gap-4 flex-wrap">
            <div>
                <h1 class="text-xl font-semibold">Thêm tài khoản</h1>
                <p class="text-sm text-white/80 mt-0.5">Đăng nhập 1 tài khoản Zalo qua QR hoặc token</p>
            </div>
            <nav class="flex flex-wrap gap-2 text-sm">
                <a href="/" class="px-3 py-1.5 rounded-md bg-white/10 hover:bg-white/20 transition-colors">← Danh sách</a>
                <a href="/explorer.html" class="px-3 py-1.5 rounded-md bg-white/10 hover:bg-white/20 transition-colors">API Docs</a>
                <a href="#" id="logoutBtn" class="px-3 py-1.5 rounded-md bg-white/10 hover:bg-white/20 transition-colors">Đăng xuất</a>
            </nav>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-6 py-6">
        <section class="bg-white border border-slate-200 rounded-xl shadow-card overflow-hidden">
            <div class="border-b border-slate-200 flex">
                <button class="tab-trigger px-5 py-3 text-sm font-medium border-b-2 border-primary-600 text-primary-600 focus:outline-none" data-tab="token">Bằng Token</button>
                <button class="tab-trigger px-5 py-3 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-900 focus:outline-none" data-tab="qr">Bằng QR</button>
            </div>

            <div class="p-6">
                <div class="tab-panel" data-panel="token">
                    <h2 class="text-base font-semibold mb-3">Thêm tài khoản bằng token</h2>
                    <form id="tokenForm" class="space-y-4">
                        <label class="block">
                            <span class="text-xs font-medium text-slate-600">Token (base64) <span class="text-slate-400">— hoặc dán z_uuid &amp; zpw_sek riêng</span></span>
                            <textarea name="token" rows="4" placeholder="eyJ6X3V1aWQiOi..."
                                class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md text-xs font-mono focus:ring-2 focus:ring-primary-500 focus:border-primary-500 focus:outline-none"></textarea>
                        </label>
                        <details class="text-sm">
                            <summary class="cursor-pointer text-slate-500 py-1">Hoặc nhập trực tiếp z_uuid &amp; zpw_sek</summary>
                            <div class="space-y-2 mt-2">
                                <label class="block">
                                    <span class="text-xs font-medium text-slate-600">z_uuid</span>
                                    <input name="z_uuid" type="text"
                                        class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md text-xs font-mono focus:ring-2 focus:ring-primary-500 focus:border-primary-500 focus:outline-none" />
                                </label>
                                <label class="block">
                                    <span class="text-xs font-medium text-slate-600">zpw_sek</span>
                                    <input name="zpw_sek" type="text"
                                        class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md text-xs font-mono focus:ring-2 focus:ring-primary-500 focus:border-primary-500 focus:outline-none" />
                                </label>
                            </div>
                        </details>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <label class="block">
                                <span class="text-xs font-medium text-slate-600">Phone</span>
                                <input name="phone" type="text" placeholder="+84..."
                                    class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 focus:outline-none" />
                            </label>
                            <label class="block">
                                <span class="text-xs font-medium text-slate-600">Display name</span>
                                <input name="displayName" type="text" placeholder="Tên hiển thị"
                                    class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 focus:outline-none" />
                            </label>
                        </div>
                        <button type="submit" class="px-5 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-md text-sm font-medium transition-colors">Đăng nhập</button>
                    </form>
                </div>

                <div class="tab-panel hidden" data-panel="qr">
                    <h2 class="text-base font-semibold mb-3">Đăng nhập bằng QR</h2>
                    <button id="newQrBtn" class="px-5 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-md text-sm font-medium transition-colors">Tạo QR mới</button>
                    <div id="qrBox" class="hidden mt-5 text-center">
                        <img id="qrImg" alt="QR code" class="inline-block max-w-[280px] rounded-lg border border-slate-200 bg-white p-2" />
                        <p class="mt-2 text-sm">Trạng thái: <span id="qrStatus" class="font-medium">—</span></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="toasts" class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>
    <script src="/add.js"></script>
</body>
</html>
