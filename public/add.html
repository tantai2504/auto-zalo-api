<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thêm tài khoản — Zalo Auto</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/auth-guard.js"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <div>
                <h1>Thêm tài khoản</h1>
                <p class="muted">Đăng nhập 1 tài khoản Zalo qua QR hoặc token để hệ thống lưu lại session.</p>
            </div>
            <nav class="header-nav">
                <a href="/">← Danh sách</a>
                <a href="/explorer.html">API Explorer</a>
                <a href="/docs" target="_blank" rel="noopener">Swagger</a>
                <a href="#" id="logoutBtn">Đăng xuất</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="card">
            <div class="tabs">
                <button class="tab active" data-tab="token">Bằng Token</button>
                <button class="tab" data-tab="qr">Bằng QR</button>
            </div>

            <div class="tab-panel" data-panel="token">
                <h2>Thêm tài khoản bằng token</h2>
                <form id="tokenForm">
                    <label>
                        Token (base64) <span class="muted">— hoặc dán z_uuid &amp; zpw_sek riêng</span>
                        <textarea name="token" rows="4" placeholder="eyJ6X3V1aWQiOi..."></textarea>
                    </label>
                    <details>
                        <summary>Nhập trực tiếp z_uuid &amp; zpw_sek</summary>
                        <label>z_uuid<input name="z_uuid" type="text" /></label>
                        <label>zpw_sek<input name="zpw_sek" type="text" /></label>
                    </details>
                    <div class="row">
                        <label>Phone <input name="phone" type="text" placeholder="+84..." /></label>
                        <label>Display name <input name="displayName" type="text" placeholder="Tên hiển thị" /></label>
                    </div>
                    <button type="submit">Đăng nhập</button>
                </form>
            </div>

            <div class="tab-panel hidden" data-panel="qr">
                <h2>Đăng nhập bằng QR</h2>
                <button id="newQrBtn">Tạo QR mới</button>
                <div id="qrBox" class="qr-box hidden">
                    <img id="qrImg" alt="QR code" />
                    <p class="status">Trạng thái: <span id="qrStatus">—</span></p>
                </div>
            </div>
        </section>
    </main>

    <div id="toasts"></div>
    <script src="/add.js"></script>
</body>
</html>
