<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng nhập — Zalo Auto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/tailwind-init.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-600 to-primary-800 font-sans">

    <div class="w-full max-w-sm bg-white rounded-2xl shadow-modal p-8 mx-4">
        <div class="mb-6">
            <h1 class="text-xl font-semibold text-slate-900">Zalo Auto</h1>
            <p class="text-sm text-slate-500 mt-1">Đăng nhập để vào dashboard quản lý.</p>
        </div>

        <div id="err" class="hidden bg-red-50 text-red-700 border border-red-200 rounded-md px-3 py-2 text-sm mb-4"></div>

        <form id="loginForm" autocomplete="on" class="space-y-3">
            <div>
                <label class="block text-xs font-medium text-slate-600 mb-1">Username</label>
                <input
                    name="username" type="text" autocomplete="username" required autofocus
                    class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500" />
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-600 mb-1">Password</label>
                <input
                    name="password" type="password" autocomplete="current-password" required
                    class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500" />
            </div>
            <button
                type="submit"
                class="w-full mt-2 bg-primary-600 hover:bg-primary-700 text-white font-medium py-2 rounded-md text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                Đăng nhập
            </button>
        </form>
    </div>

    <script>
        const $ = (s) => document.querySelector(s);
        const errBox = $("#err");

        (async () => {
            try {
                const r = await fetch("/admin/me", { credentials: "same-origin" });
                if (r.ok) {
                    const d = await r.json();
                    if (d.ok && (d.data.authEnabled === false || d.data.user)) {
                        location.href = "/";
                    }
                }
            } catch {}
        })();

        $("#loginForm").addEventListener("submit", async (ev) => {
            ev.preventDefault();
            errBox.classList.add("hidden");
            const fd = new FormData(ev.currentTarget);
            const body = { username: fd.get("username"), password: fd.get("password") };
            const btn = ev.currentTarget.querySelector("button");
            btn.disabled = true;
            btn.textContent = "Đang đăng nhập…";
            try {
                const r = await fetch("/admin/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                    credentials: "same-origin",
                });
                const d = await r.json();
                if (d.ok) {
                    const next = new URLSearchParams(location.search).get("next") || "/";
                    location.href = next;
                    return;
                }
                errBox.textContent = d.error?.message ?? "Đăng nhập thất bại";
                errBox.classList.remove("hidden");
            } catch (err) {
                errBox.textContent = err.message;
                errBox.classList.remove("hidden");
            } finally {
                btn.disabled = false;
                btn.textContent = "Đăng nhập";
            }
        });
    </script>
</body>
</html>
